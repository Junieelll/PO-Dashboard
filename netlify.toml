[build]
  command = "npm --prefix server install"
  publish = "."
  functions = "netlify/functions"

[[redirects]]
  from = "/auth/*"
  to = "/.netlify/functions/api/auth/:splat"
  status = 200

[[redirects]]
  from = "/sheets/*"
  to = "/.netlify/functions/api/sheets/:splat"
  status = 200

[[redirects]]
  from = "/data/*"
  to = "/.netlify/functions/api/data/:splat"
  status = 200

[[redirects]]
  from = "/email/*"
  to = "/.netlify/functions/api/email/:splat"
  status = 200

[[redirects]]
  from = "/share/*"
  to = "/.netlify/functions/api/share/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
