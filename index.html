<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PO Tracker</title>
<meta name="description" content="Purchase Order Tracker — Track PO entries, get email alerts, share data."/>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌸</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="manifest" href="/manifest.json"/>
<meta name="theme-color" content="#7c5cfc"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="PO Tracker"/>
<link rel="apple-touch-icon" href="/pwa_icon_512.png"/>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js').then(reg => {
        console.log('PO Tracker SW registered:', reg);
      }).catch(err => {
        console.error('PO Tracker SW failed:', err);
      });
    });
  }
</script>

<script>
tailwind.config = {
  theme: {
    extend: {
      fontFamily: { sans: ['Poppins', 'system-ui', '-apple-system', 'sans-serif'] },
      colors: {
        body: 'var(--bg)',
        surface: { DEFAULT: 'var(--surface)', 2: 'var(--surface-2)', 3: 'var(--surface-3)' },
        line: { DEFAULT: 'var(--border)', lit: 'var(--border-lit)' },
        txt: { DEFAULT: 'var(--text)', 2: 'var(--text-2)', 3: 'var(--text-3)' },
        accent: { DEFAULT: 'oklch(71.2% 0.194 13.428)', 2: 'oklch(64.5% 0.246 16.439)', glow: 'var(--accent-glow)' },
        ok: '#34d399',
        warn: '#fbbf24',
        danger: '#ed3c3c',
        teal: '#2dd4bf',
      },
    }
  }
}
</script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #181a24;
    --surface-2: #1f2230;
    --surface-3: #292d3e;
    --border: #2e3348;
    --border-lit: #3d4260;
    --text: #edeef4;
    --text-2: #9a9cb8;
    --text-3: #5f627e;
    --accent: oklch(71.2% 0.194 13.428);
    --accent-2: oklch(64.5% 0.246 16.439);
    --accent-glow: rgba(124, 92, 252, 0.12);
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.25);
    --shadow-md: 0 4px 20px rgba(0,0,0,0.3);
    --shadow-lg: 0 12px 40px rgba(0,0,0,0.4);
  }

  body.light {
    --bg: #f0f1f7;
    --surface: #ffffff;
    --surface-2: #f5f6fa;
    --surface-3: #eaecf4;
    --border: #d8dae6;
    --border-lit: #c0c3d4;
    --text: #12131f;
    --text-2: #4f5270;
    --text-3: #8c8faa;
    --accent-glow: rgba(124, 92, 252, 0.08);
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.06);
    --shadow-lg: 0 12px 40px rgba(0,0,0,0.08);
  }

  html { font-size: 14px; }
  body {
    background: var(--bg);
    color: var(--text);
    transition: background 0.35s, color 0.35s;
  }

  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 8px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-3); }

  /* ── Icon base ───────────────────────────────────── */
  .ico { width: 20px; height: 20px; display: inline-block; vertical-align: -4px; flex-shrink: 0; }

  /* ── Keyframes ───────────────────────────────────── */
  @keyframes fadeIn    { from { opacity: 0; } to { opacity: 1; } }
  @keyframes fadeUp    { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes scaleIn   { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); } }
  @keyframes shake     { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }
  @keyframes pulse     { 0%,100%{opacity:1} 50%{opacity:0.35} }
  @keyframes toastIn   { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
  @keyframes toastOut  { from { opacity:1; transform:translateY(0); } to { opacity:0; transform:translateY(20px); } }
  @keyframes rowIn     { from { opacity:0; transform:translateX(-8px); } to { opacity:1; transform:translateX(0); } }
  @keyframes float1    { 0%,100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-20px) rotate(3deg); } }
  @keyframes float2    { 0%,100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-14px) rotate(-2deg); } }
  @keyframes orbDrift  { 0% { transform: translate(0,0) scale(1); } 33% { transform: translate(30px,-20px) scale(1.05); } 66% { transform: translate(-20px,15px) scale(0.95); } 100% { transform: translate(0,0) scale(1); } }

  .anim-fadeIn   { animation: fadeIn 0.4s ease-out; }
  .anim-fadeUp   { animation: fadeUp 0.4s ease-out both; }
  .anim-scaleIn  { animation: scaleIn 0.25s ease-out; }
  .anim-shake    { animation: shake 0.4s; }
  .anim-pulse    { animation: pulse 2s infinite; }
  .anim-toastIn  { animation: toastIn 0.3s ease-out; }
  .anim-toastOut { animation: toastOut 0.3s ease-in forwards; }
  .anim-rowIn    { animation: rowIn 0.2s ease-out both; }
  .anim-float1   { animation: float1 6s ease-in-out infinite; }
  .anim-float2   { animation: float2 8s ease-in-out infinite; }
  .anim-orbDrift { animation: orbDrift 15s ease-in-out infinite; }

  /* ── Interactive component states ────────────────── */
  /* Calendar / Datepicker */
  .c-cal {
    position: absolute; top: calc(100% + 6px); left: 0; z-index: 200;
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: 16px; box-shadow: var(--shadow-lg);
    padding: 14px; width: 296px;
    opacity: 0; visibility: hidden; transform: translateY(6px);
    transition: opacity 0.18s ease, transform 0.18s ease, visibility 0.18s;
  }
  .c-datepicker.open .c-cal { opacity: 1; visibility: visible; transform: translateY(0); }
  .c-datepicker.open .c-date-trigger { border-color: var(--accent) !important; box-shadow: 0 0 0 3px var(--accent-glow); }
  .c-datepicker.inline .c-date-trigger { border: none !important; background: none !important; padding: 0 !important; font-size: 13px; cursor: pointer; gap: 6px; }
  .c-datepicker.inline .c-date-trigger .ico { width: 14px; height: 14px; }
  .c-datepicker.inline.open .c-date-trigger { border: none !important; box-shadow: none !important; }

  /* Custom Select */
  .c-select-menu {
    position: absolute; top: calc(100% + 6px); left: 0; right: 0; z-index: 200;
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: 12px; box-shadow: var(--shadow-lg); padding: 5px;
    opacity: 0; visibility: hidden; transform: translateY(6px);
    transition: opacity 0.18s ease, transform 0.18s ease, visibility 0.18s;
  }
  .c-select.open .c-select-menu { opacity: 1; visibility: visible; transform: translateY(0); }
  .c-select.open .c-select-trigger { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
  .c-select.open .c-chevron svg { transform: rotate(180deg); }

  /* Alert popover */
  .alert-popover {
    position: absolute; top: calc(100% + 10px); right: 0;
    min-width: 400px;
    width: max-content; max-width: 600px; display: flex; flex-direction: column;
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: 20px; box-shadow: var(--shadow-lg);
    opacity: 0; visibility: hidden; transform: translateY(10px) scale(0.96);
    transform-origin: top right;
    transition: opacity 0.2s ease, transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.1), visibility 0.2s;
    z-index: 500;
  }
  .alert-wrap.open .alert-popover { opacity: 1; visibility: visible; transform: translateY(0) scale(1); }

  /* Calendar interactive elements */
  .c-cal-day.today::after {
    content: ''; position: absolute; bottom: 3px; left: 50%; transform: translateX(-50%);
    width: 4px; height: 4px; border-radius: 50%; background: #7c5cfc;
  }
  .c-cal-day.selected { background: #7c5cfc !important; color: white !important; font-weight: 600; }

  /* Active tab indicator */
  .tab-active::after {
    content: ''; position: absolute;
    bottom: -10px; left: 16px; right: 16px; height: 2px;
    background: linear-gradient(90deg, #7c5cfc, #2dd4bf);
    border-radius: 2px;
  }

  /* Table row states */
  .row-danger { background: rgba(248,113,113,0.04); }
  .row-danger:hover { background: rgba(248,113,113,0.08) !important; }
  .row-warn { background: rgba(251,191,36,0.04); }
  .row-warn:hover { background: rgba(251,191,36,0.08) !important; }

  /* Cell focus-within */
  .cell-wrap:focus-within { background: rgba(124,92,252,0.06); border-color: #7c5cfc; border-radius: 6px; }

  /* Date input color scheme */
  .cell-input[type="date"] { color-scheme: dark; }
  body.light .cell-input[type="date"] { color-scheme: light; }

  /* Progress bar fills */
  .progress-ok     { background: linear-gradient(90deg, #34d399, #6ee7b7); }
  .progress-warn   { background: linear-gradient(90deg, #fbbf24, #fcd34d); }
  .progress-danger { background: linear-gradient(90deg, #f87171, #fca5a5); }

  /* Row animation stagger */
  .po-table tbody tr { animation: rowIn 0.2s ease-out both; }
  .po-table tbody tr:nth-child(1)  { animation-delay: 0.01s; }
  .po-table tbody tr:nth-child(2)  { animation-delay: 0.03s; }
  .po-table tbody tr:nth-child(3)  { animation-delay: 0.05s; }
  .po-table tbody tr:nth-child(4)  { animation-delay: 0.07s; }
  .po-table tbody tr:nth-child(5)  { animation-delay: 0.09s; }
  .po-table tbody tr:nth-child(6)  { animation-delay: 0.11s; }
  .po-table tbody tr:nth-child(7)  { animation-delay: 0.13s; }
  .po-table tbody tr:nth-child(8)  { animation-delay: 0.15s; }

  /* Card stagger */
  .po-card:nth-child(1) { animation-delay: 0.02s; }
  .po-card:nth-child(2) { animation-delay: 0.06s; }
  .po-card:nth-child(3) { animation-delay: 0.10s; }
  .po-card:nth-child(4) { animation-delay: 0.14s; }

  /* Delete button visibility on row hover */
  .row-del { opacity: 0; transition: opacity 0.2s; }
  .po-table tbody tr:hover .row-del { opacity: 1; }

  @media (max-width: 768px) {
    .topbar-responsive { padding: 0 14px !important; height: 54px !important; }
    .content-responsive { padding: 14px !important; }
    .tab-bar-responsive { padding: 8px 14px !important; }
  }

  /* ── Button loading state ─────────────────────────────── */
  @keyframes btn-spin {
    to { transform: rotate(360deg); }
  }
  .btn-spinner {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid currentColor;
    border-top-color: transparent;
    border-radius: 50%;
    animation: btn-spin 0.65s linear infinite;
    vertical-align: -3px;
    flex-shrink: 0;
    opacity: 0.85;
  }
  button[data-loading="true"] {
    opacity: 0.72;
    cursor: not-allowed;
    pointer-events: none;
  }

  /* ── App boot skeleton ────────────────────────────────── */
  .app-skeleton {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 14px;
  }
  @keyframes skeleton-pulse {
    0%,100% { opacity: 0.4; }
    50%      { opacity: 0.9; }
  }
  .skeleton-bar {
    height: 10px;
    background: var(--border);
    border-radius: 8px;
    animation: skeleton-pulse 1.4s ease-in-out infinite;
  }
</style>
</head>
<body class="font-sans min-h-screen antialiased overflow-x-hidden">
<div id="app"></div>
<div id="toast-container" class="fixed bottom-6 left-1/2 -translate-x-1/2 flex flex-col-reverse gap-2.5 z-[2000] pointer-events-none items-center w-full max-w-[400px] px-4"></div>
<div id="fab-container" class="fixed bottom-8 left-1/2 -translate-x-1/2 z-[100] transition-all duration-300 transform translate-y-24 opacity-0 flex items-center gap-4 bg-surface border-[1.5px] border-line px-5 py-3 rounded-2xl shadow-xl pointer-events-none">
  <div class="flex items-center gap-2 border-r border-line pr-4">
    <div class="flex items-center justify-center w-[22px] h-[22px] rounded-md bg-accent/10 text-accent font-bold text-xs" id="fab-count">0</div>
    <span class="text-[13px] font-semibold text-txt-2 tracking-wide select-none">Items Selected</span>
  </div>
  <button id="btn-fab-delete" class="flex items-center gap-1.5 px-3.5 py-2 rounded-xl bg-danger/10 text-danger hover:bg-danger hover:text-white transition-colors text-[11px] font-bold uppercase tracking-wide cursor-pointer pointer-events-auto shadow-sm">
    <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
    Delete
  </button>
</div>
<script type="module" src="js/app.js"></script>
</body>
</html>
